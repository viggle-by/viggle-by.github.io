<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vigg Loader</title>
    <!-- Minecraft Font from Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body,
      html {
        height: 100%;
        font-family: 'Press Start 2P', cursive;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #2f2f2f;
      }

      /* Loader Styles */
      .loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background-color: #333;
        z-index: 1000;
        color: white;
        text-align: center;
        visibility: visible;
      }

      .loader-bar {
        width: 80%;
        background-color: #444;
        border-radius: 10px;
        height: 30px;
        margin-top: 20px;
        position: relative;
      }

      .loader-progress {
        background-color: #76d7c4;
        height: 100%;
        border-radius: 10px;
        width: 0;
        transition: width 1s ease-in-out;
      }

      .loader-text {
        font-size: 2rem;
        margin-bottom: 20px;
        color: white;
      }

      /* Button styles */
      .btn {
        background-color: #76d7c4;
        color: #fff;
        font-size: 1.5rem;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .btn:hover {
        background-color: #48c9b0;
      }

      /* Hidden content after loading */
      .content {
        display: none;
        text-align: center;
        color: white;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <!-- Loader container -->
    <div id="loader" class="loader-container">
      <div class="loader-text">vigg loader</div>
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
      <button class="btn" id="openBtn" onclick="openInNewTab()">Open</button>
    </div>

    <!-- Content to be shown after loader finishes -->
    <div id="content" class="content">
      <h1>Welcome to Vigg Loader!</h1>
      <p>The loading process is complete. Enjoy your experience!</p>
    </div>

    <script>
      // Simulate loading process
      let progress = 0;

      function simulateLoading() {
        const progressBar = document.querySelector('.loader-progress');
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        const interval = setInterval(() => {
          progress += 10;
          progressBar.style.width = progress + '%';

          if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
              loader.style.visibility = 'hidden'; // Hide loader
              content.style.display = 'block'; // Show content
            }, 500);
          }
        }, 500);
      }

      // Open the target URL in a new tab via about:blank
      function openInNewTab() {
        const newTab = window.open('about:blank', '_blank');
        newTab.location.href = 'https://viggle-by.github.io/uee/';
      }

      // Start the loading process
      simulateLoading();
    </script>
  </body>
</html>
