        left: 0;

        width: 0;
        height: 100%;

        margin: 0;
        padding: 0;

      }
      .loader > div > span {
        font-family: var(--font);
        margin: 0;
        padding: 0;
        font-size: 24px;
      }
      .hidden {
        display: none;
      }
      .noscript {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;

        justify-content: center;
        flex-direction: column;
        gap: 20px;
      }
      .noscript * {
        margin: 0;
        padding: 0;
      }
